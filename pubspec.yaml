name: alu_nexus
description: ALU Nexus — connecting ALU students with student-led startups for meaningful internship experiences.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.5

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # UI & Styling
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # Utilities
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  rxdart: ^0.28.0

  # Local Storage
  shared_preferences: ^2.3.5

  # Network
  connectivity_plus: ^6.1.4

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.ttf
          weight: 400
        - asset: assets/fonts/Satoshi-Medium.ttf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.ttf
          weight: 700
        - asset: assets/fonts/Satoshi-Black.ttf
          weight: 900
    - family: Sentient
      fonts:
        - asset: assets/fonts/Sentient-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sentient-Bold.ttf
          weight: 700
